name: Set up Node.js and install dependencies
description: Pinned actions/setup-node followed by npm ci, sharing one cache key across all workflows.

inputs:
  working-directory:
    description: Directory containing package-lock.json and package.json.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: "npm"
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
        node-version: "24.14.1"

    - run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
