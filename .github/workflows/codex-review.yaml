name: Codex code review (dogfood)

# Mirrors the Production workflow example documented in README.md so this
# repository's own PRs exercise the hardened pattern end to end.
# Substitutions from the README example: allow-users is bound to the
# maintainer; the three self-action SHAs are pinned to a reviewed commit on
# main and refreshed to the latest release tag by
# scripts/refresh-self-pins.ts after each release; `fail-on-missing-chunks`
# and `retain-findings` are quoted explicitly to match the auditor-visible
# pattern documented in docs/consumer-controls.md items 7 and 8.
#
# Two patterns are excluded from review on this dogfood:
#
#   - dist/** — bundled artifact rebuilt on most src-touching PRs. Excluded
#     at two layers during the exclude-paths rollout: paths-ignore on the
#     trigger keeps the workflow from running on dist-only PRs at all, and
#     exclude-paths on the prepare step drops dist/** from the diff before
#     chunking on mixed PRs that touch both src and dist.
#
#   - package-lock.json — lockfile diffs on manual dep bumps are mechanical
#     resolver output where AI review value is low. Manifest-vs-lockfile
#     version drift is caught structurally by
#     .github/actions/verify-lockfile-version/, and Dependabot lockfile-only
#     bumps are filtered out of review by allow-users: milanhorvatovic.
#
# Until the next release ships and scripts/refresh-self-pins.ts bumps the
# pinned SHA below to a commit that recognizes the exclude-paths input,
# both exclude-paths entries are no-ops (the pinned SHA emits an
# "Unexpected input(s)" warning and ignores the value, same shape as the
# v2.1.0 fail-on-missing-chunks rollout in consumer-controls.md item 8).
# In that window paths-ignore carries the dist/** mitigation alone, and
# manual dep bumps still consume tokens on the lockfile diff — both clear
# up after the SHA refresh, at which point paths-ignore can also be
# dropped because exclude-paths covers mixed PRs and pure-dist PRs become
# an empty diff after exclusion. See issue #106.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - "dist/**"

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    # Skip drafts; refuse fork PRs so secrets and broader permissions never see fork-controlled code.
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04 # pinned image; bump as GitHub retires older runner versions
    permissions:
      contents: read
    timeout-minutes: 10
    outputs:
      skipped: ${{ steps.prepare.outputs.skipped }}
      has-changes: ${{ steps.prepare.outputs.has-changes }}
      chunk-count: ${{ steps.prepare.outputs.chunk-count }}
      chunk-matrix: ${{ steps.prepare.outputs.chunk-matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }} # all jobs check out the same SHA the workflow was triggered on
          fetch-depth: 0
          persist-credentials: false

      - id: prepare
        uses: milanhorvatovic/codex-ai-code-review-action/prepare@0fc55cdd3d5cf9841c9ba58822354f67b6c63293 # v2.1.0-pre
        with:
          allow-users: milanhorvatovic # bounds OpenAI cost while the dogfood is being proven out; revisit after one release cycle
          exclude-paths: | # see header comment for the per-pattern rationale; ignored by SHAs pre-this-release
            dist/**
            package-lock.json
          max-chunk-bytes: ${{ vars.CODEX_MAX_CHUNK_BYTES || '204800' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.prepare.outputs.skipped != 'true' && steps.prepare.outputs.has-changes == 'true'
        with:
          name: codex-prepare
          path: .codex/
          include-hidden-files: true # .codex/ is dot-prefixed; without this the upload silently skips it
          retention-days: 1 # ephemeral hand-off; default 90 days burns storage and lengthens diff retention

  review:
    needs: prepare
    if: needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    environment: codex-review # scopes OPENAI_API_KEY; do not add required reviewers (matrix would trigger one prompt per chunk)
    permissions:
      contents: read
    timeout-minutes: 30 # applies per matrix leg, not total — bound on a single chunk's Codex run, not a budget across all chunks
    strategy:
      fail-fast: false # one failing chunk must not cancel the others; partial output is recoverable
      matrix: ${{ fromJson(needs.prepare.outputs.chunk-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: milanhorvatovic/codex-ai-code-review-action/review@0fc55cdd3d5cf9841c9ba58822354f67b6c63293 # v2.1.0-pre
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          chunk: ${{ matrix.chunk }}
          effort: ${{ vars.CODEX_EFFORT || '' }} # empty = Codex CLI default
          model: ${{ vars.CODEX_MODEL || '' }} # empty = Codex CLI default

  publish:
    needs: [prepare, review]
    # always() keeps publish running when a review matrix leg fails so partial output still posts.
    if: always() && needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .codex/
          merge-multiple: true

      - uses: milanhorvatovic/codex-ai-code-review-action/publish@0fc55cdd3d5cf9841c9ba58822354f67b6c63293 # v2.1.0-pre
        with:
          github-token: ${{ github.token }}
          expected-chunks: ${{ needs.prepare.outputs.chunk-count }}
          retain-findings: "true" # retention approved so dogfood findings stay available for ongoing review-quality iteration (CC-07 consent)
          retain-findings-days: ${{ vars.CODEX_RETAIN_FINDINGS_DAYS || '7' }} # tight window; raise via vars if longer history is needed
          min-confidence: ${{ vars.CODEX_MIN_CONFIDENCE || '0' }} # 0 = no filtering until tune recommends a cutoff
          max-comments: ${{ vars.CODEX_MAX_COMMENTS || '' }} # empty = unlimited
          model: ${{ vars.CODEX_MODEL || '' }} # footer label; pairs with the review job's model
          fail-on-missing-chunks: "true" # explicit for auditors (consumer-controls.md item 8)
