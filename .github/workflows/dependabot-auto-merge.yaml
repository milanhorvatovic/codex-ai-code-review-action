name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: read
  pull-requests: read

# Serialize per PR: rapid `synchronize`/`labeled` events from Dependabot or maintainers can
# trigger overlapping runs; without serialization the auto-merge job races against itself
# (one run merges; a parallel run later attempts the same merge and exits non-zero on an
# already-merged PR).
#
# `cancel-in-progress` is conditional. We cancel for `opened`/`reopened`/`synchronize`
# (the new event has fresher PR state to merge against) and for either security-review
# `labeled` event (`trust-boundary` or `security-review-required`, both meaning "stop the
# merge now"). We do NOT cancel for non-security-review `labeled` events: Dependabot adds
# `dependencies`/`release: patch`/etc. labels in rapid succession right after opening a
# PR, and those replacement runs skip both `rebuild-dist` and `auto-merge` per their `if:`
# guards — so canceling the in-flight merge run for them would leave the PR stranded with
# neither a synchronous merge nor auto-merge enabled. Letting them queue behind the
# in-flight run is harmless (they're no-ops on the merge path) and avoids the stall.
concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event.action != 'labeled' || github.event.label.name == 'trust-boundary' || github.event.label.name == 'security-review-required' }}

jobs:
  rebuild-dist:
    # Skip on label events — head SHA is unchanged, so dist/ cannot have drifted since the last
    # opened/synchronize run. Avoids a wasted no-op rebuild when a maintainer applies a label.
    if: >-
      github.event.action != 'labeled' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Disable git hooks
        run: git config --local core.hooksPath /dev/null

      - uses: ./.github/actions/setup-node-deps

      - name: Build
        run: npm run build

      - name: Detect dist changes
        id: dist
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "dist/ is already up to date; nothing to commit."
          fi

      # Mint a short-lived token from the `oss-automation-bot` GitHub App.
      # Used to authenticate the GraphQL `createCommitOnBranch` mutation
      # that lands the rebuilt dist/ on the PR branch. Replaces a prior
      # multi-secret + GPG-import flow that required maintaining a PAT, a
      # GPG key, and committer-identity variables across both the Actions
      # and Dependabot secret stores.
      #
      # Why GraphQL rather than plain `git push`: pushes from an
      # App-installation token over HTTPS authenticate the push but do
      # NOT sign the locally-created commit, so a `git push` path would
      # land rebuild-dist commits as Unverified. `createCommitOnBranch`
      # creates the commit server-side under the authenticated App
      # identity; GitHub signs commits authored via this mutation on
      # behalf of the App, so rebuild-dist commits stay Verified just
      # like under the prior GPG flow — without any GPG key or
      # committer-identity configuration to manage.
      #
      # `create-github-app-token` fails the job if
      # `vars.AUTOMATION_APP_ID` or `secrets.AUTOMATION_PRIVATE_KEY` is
      # missing, which subsumes the prior `Validate rebuild-dist
      # configuration` step's role. The private key must exist in BOTH
      # the Actions and Dependabot secrets stores — Dependabot-triggered
      # workflows cannot read Actions secrets and vice versa, the same
      # dual-store pattern documented for `CODEOWNER_APPROVER_TOKEN` in
      # `dependabot-reconciler.yaml`.
      #
      # The token is narrowed to `contents: write` only. Omitting
      # `permission-*` inputs would mint with the App installation's
      # full permission set; the sole consumer of this token is the
      # `createCommitOnBranch` mutation, which requires `contents:
      # write`, so broader scopes are avoidable privilege expansion in
      # a Dependabot-context job.
      - name: Mint oss-automation-bot token for dist push
        if: steps.dist.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit dist as oss-automation-bot via createCommitOnBranch
        if: steps.dist.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Stage everything under dist/ first. The detect step above uses
          # `git status --porcelain dist/`, which reports untracked entries
          # (`??`) — a brand-new ncc chunk or a fresh `licenses.txt` flips
          # `changed=true`. A plain `git diff HEAD -- dist/` does NOT list
          # untracked files, so without staging those new files would
          # silently drop out of `fileChanges` and the mutation would land
          # an incomplete dist/ (or reject the call outright). `git add -A
          # dist/` lifts untracked additions into the index so the cached
          # diff classifies them as `A`.
          git add -A dist/

          # Walk the staged diff under dist/ and split into additions/deletions.
          # `--no-renames` keeps the status set to {A,M,D} (rename status
          # `R` would produce a three-column record requiring different
          # parsing); `-z` makes records null-terminated so paths with
          # spaces never break the split. dist/ paths don't contain
          # spaces today, but the safe form costs nothing and removes a
          # future foot-gun.
          #
          # `git diff -z --name-status` emits paired NUL-separated fields
          # per record: `<status>\0<path>\0` (NOT a single tab-joined
          # field). Read two paired NUL-terminated fields per iteration.
          additions='[]'
          deletions='[]'
          while IFS= read -r -d '' status && IFS= read -r -d '' path; do
            case "$status" in
              A|M)
                # createCommitOnBranch's `FileAddition.contents` is a
                # Base64String; `-w0` keeps the encoded blob single-line
                # so jq's `--arg` substitution and the final JSON payload
                # both stay valid.
                content_b64=$(base64 -w0 "$path")
                additions=$(jq --arg p "$path" --arg c "$content_b64" \
                  '. + [{path: $p, contents: $c}]' <<<"$additions")
                ;;
              D)
                deletions=$(jq --arg p "$path" '. + [{path: $p}]' <<<"$deletions")
                ;;
              *)
                echo "::error::Unexpected git status '$status' for '$path'."
                exit 1
                ;;
            esac
          done < <(git diff --cached --name-status --no-renames -z -- dist/)

          # Single GraphQL mutation. The App-installation token
          # authenticates the call so GitHub signs the resulting commit
          # server-side — the rebuild-dist commit lands Verified with
          # author/committer = oss-automation-bot[bot], no local
          # committer config required. `expectedHeadOid` pins the parent
          # commit: if a maintainer pushed to the branch during the
          # build, the mutation fails rather than silently overwriting
          # their work. The resulting `synchronize` event is attributed
          # to the App identity (not GITHUB_TOKEN), so downstream
          # required-check workflows fire on the new head — matching
          # the property the reconciler exploits via `gh pr
          # update-branch`, and avoiding the GITHUB_TOKEN anti-loop
          # suppression that would otherwise leave stale checks blocking
          # auto-merge under `strict_required_status_checks_policy: true`.
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg head_oid "$HEAD_SHA" \
            --argjson additions "$additions" \
            --argjson deletions "$deletions" \
            '{
              query: "mutation($r:String!,$b:String!,$h:GitObjectID!,$a:[FileAddition!]!,$d:[FileDeletion!]!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$r,branchName:$b},message:{headline:\"chore: rebuild dist after dependency update\"},fileChanges:{additions:$a,deletions:$d},expectedHeadOid:$h}){commit{oid}}}",
              variables: {r: $repo, b: $branch, h: $head_oid, a: $additions, d: $deletions}
            }' \
            | gh api graphql --input - --silent

  auto-merge:
    # Skip on label events — auto-merge is set once at open/synchronize time. If a maintainer later
    # applies either security-review label (trust-boundary or security-review-required), the
    # disable-auto-merge-on-security-review job below handles revoking the previously-enabled
    # auto-merge.
    if: >-
      github.event.action != 'labeled' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: rebuild-dist
    runs-on: ubuntu-latest
    # `gh pr checks --watch` blocks until every required check reaches a terminal state.
    # If a check hangs (stuck self-hosted runner, never-reporting integration, etc.),
    # the run would otherwise wait up to GitHub's 6-hour default and tie up the per-PR
    # concurrency slot. 30 minutes is well above the typical required-check runtime
    # (verify-dist/test/actionlint/verify-pr-release-label all finish in 1-3 minutes),
    # so a 30-minute cap surfaces a genuine hang as a workflow failure without flaking
    # on normal runs.
    timeout-minutes: 30
    # `checks: read` and `statuses: read` are required by `gh pr checks --required
    # --watch` to read check-run and legacy commit-status state. With an explicit
    # `permissions:` block any unspecified scope defaults to `none`, so these must be
    # listed here even though `pull-requests: write` is also set.
    permissions:
      checks: read
      contents: write
      pull-requests: write
      statuses: read
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # `steps.metadata.outputs.update-type` is the most-severe per-dep type across the group.
      # The dogfood self-reference bumps SHA→SHA under the same prerelease tag, which
      # fetch-metadata conservatively reports as semver-major. Treating that as "major" for
      # gating purposes blocks otherwise-safe grouped patches and standalone self-bumps.
      #
      # Walk `updated-dependencies-json` instead and pick the most-severe update-type after
      # excluding the self-reference *only* when its bump is SHA-only same-version
      # (`prevVersion == newVersion`). Real major bumps of the self-reference still classify
      # as semver-major and route to manual review. The self-reference is identified via
      # `github.repository` so a rename/transfer/fork picks up the new name automatically.
      - name: Derive effective update-type
        id: effective
        env:
          SELF_DEPENDENCY: ${{ github.repository }}
          UPDATED_JSON: ${{ steps.metadata.outputs.updated-dependencies-json }}
        run: |
          set -euo pipefail
          effective=$(jq -r --arg self "$SELF_DEPENDENCY" '
            [.[]
              | select(.dependencyName != $self or .prevVersion != .newVersion)
              | .updateType]
            | if any(. == "version-update:semver-major") then "version-update:semver-major"
              elif any(. == "version-update:semver-minor") then "version-update:semver-minor"
              elif any(. == "version-update:semver-patch") then "version-update:semver-patch"
              else "version-update:semver-patch"
              end
          ' <<<"$UPDATED_JSON")
          echo "update-type=$effective" >> "$GITHUB_OUTPUT"

      # See CONTRIBUTING.md → Security-review-required changes for the policy.
      # Two guards coexist intentionally:
      #   1. Exclude-by-name: skip auto-merge for any (possibly grouped) bump that includes
      #      `openai/codex-action`. The exclude list is intentionally action-level
      #      dependencies only — packages whose code runs inside the workflow with secrets
      #      in scope. Passive deps (e.g. `actions/checkout`) are not on the list because
      #      their bumps are caught by the criteria-based label guards. Extend this list
      #      when a new action-level trust-boundary or containment-mechanism dependency
      #      is added to the repo.
      #   2. Label guard: skip auto-merge for any PR a maintainer has manually labeled
      #      `trust-boundary` or `security-review-required`, even if the dep is not yet
      #      on the exclude list.
      # The `if:` clauses below evaluate against the event payload captured at workflow start.
      # That payload can be stale by the time this step runs (label applied during the run).
      # The runtime checks inside `run:` close that TOCTOU race — see the comments there.
      #
      # Auto-approval runs before auto-merge enable so that, by the time auto-merge fires,
      # the required code-owner review is already in place. The repo's branch ruleset on
      # `main` requires one approving review with code-owner approval, and `GITHUB_TOKEN`
      # cannot approve PRs (Dependabot also cannot approve its own). A separately-issued
      # PAT belonging to a code-owner is required and must be stored as a *Dependabot*
      # secret (workflows triggered by Dependabot do not have access to Actions secrets).
      # When the secret is unset, the step warns and skips — auto-merge is still enabled
      # and the PR waits for manual approval, matching the prior behavior.
      - name: Approve PR (so required-review check passes)
        if: >-
          steps.effective.outputs.update-type != 'version-update:semver-major'
          && !contains(steps.metadata.outputs.dependency-names, 'openai/codex-action')
          && !contains(github.event.pull_request.labels.*.name, 'trust-boundary')
          && !contains(github.event.pull_request.labels.*.name, 'security-review-required')
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_APPROVE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # This step is intentionally fail-open: any failure (missing token, revoked PAT,
        # insufficient PAT scope, transient GitHub API error, malformed response) emits a
        # warning and exits 0. The merge step downstream queries the authoritative
        # `reviewDecision` at merge time and falls back to `gh pr merge --auto --squash`
        # when it isn't `APPROVED` — so a later manual code-owner approval can still fire
        # the merge. A hard failure here would skip the merge step entirely, hiding the
        # underlying problem; the warning + fallback chain surfaces it without stranding
        # the PR.
        #
        # GitHub Actions invokes the default bash shell as `bash --noprofile --norc -eo
        # pipefail {0}`, so errexit is on by default. We explicitly disable it (`set +e`)
        # because future edits could add an unwrapped `gh` call and silently regress the
        # fail-open invariant. Every external command below is independently guarded with
        # `if !` and emits a warning before `exit 0`; preserve that pattern when extending.
        run: |
          set +e
          set -uo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::DEPENDABOT_APPROVE_TOKEN is not set — skipping auto-approval. The merge step will fall back to GitHub auto-merge, which waits for a manual code-owner approval. Configure a fine-grained PAT scoped to this repo (Pull requests: write) belonging to a code-owner and store it under Settings → Secrets and variables → Dependabot → DEPENDABOT_APPROVE_TOKEN."
            exit 0
          fi
          if ! label_state=$(gh pr view "$PR_URL" --json labels --jq 'any(.labels[]; .name == "trust-boundary" or .name == "security-review-required")'); then
            echo "::warning::Failed to query security-review label state; skipping auto-approval. The merge step will fall back to GitHub auto-merge."
            exit 0
          fi
          if [ "$label_state" = "true" ]; then
            echo "security-review label (trust-boundary or security-review-required) is now present (applied after workflow start); skipping auto-approval."
            exit 0
          fi
          if ! gh pr review --approve --body "Auto-approved by the Dependabot Auto-Merge workflow (non-major, no security-review label)." "$PR_URL"; then
            echo "::warning::Failed to post auto-approval review (likely a revoked or insufficiently-scoped DEPENDABOT_APPROVE_TOKEN, or a transient GitHub API error). The merge step will fall back to GitHub auto-merge."
            exit 0
          fi

      # Wait for required status checks, then squash-merge synchronously when the PR has
      # the required code-owner review; otherwise fall back to enabling GitHub auto-merge
      # so a later manual approval can fire the merge. The synchronous path is what fixes
      # the auto-merge worker stall (see PR #114): merging inline under the bot's still-
      # valid GITHUB_TOKEN eliminates the enable→fire race that the server-side worker
      # occasionally drops after the last required check transitions green.
      #
      # Three robustness properties handled here:
      #   1. Authoritative review check. The decision to merge synchronously is gated on
      #      `gh pr view --json reviewDecision == APPROVED`, which is GitHub's own answer
      #      to "is this PR sufficiently approved per the ruleset?" — including the code-
      #      owner-review requirement. This is stricter than checking whether the auto-
      #      approval step exited 0: if `DEPENDABOT_APPROVE_TOKEN` belongs to a non-CODEOWNER
      #      identity, `gh pr review --approve` succeeds but `reviewDecision` stays
      #      `REVIEW_REQUIRED` and we correctly fall back instead of failing on the merge.
      #   2. Fail-closed label query. Both security-review labels (trust-boundary,
      #      security-review-required) are queried together via a tri-state helper that
      #      returns `unknown` on `gh pr view` errors. Pre- and post-poll `unknown` exits
      #      the job with `::error::` rather than arming auto-merge: if either label was
      #      actually present and the reactive disable job already ran, an armed auto-merge
      #      here cannot be backstopped. The same fail-closed treatment runs after
      #      `arm_auto_merge` enables auto-merge — `unknown` triggers a defensive
      #      `gh pr merge --disable-auto` and a non-zero return.
      #   3. Concurrency-safe. Workflow-level concurrency cancels overlapping runs on the
      #      same PR, so the `gh pr checks --watch` loop here is interrupted cleanly when
      #      a new commit lands rather than racing a fresh run.
      #
      # Security-review handling: the label state is re-checked twice on the synchronous
      # path — once before polling (so we don't waste minutes waiting on a PR we won't
      # merge) and again immediately before the merge (closing the race where a maintainer
      # applies a label while checks run). The fallback path keeps the original post-enable
      # revert.
      #
      # A residual TOCTOU window remains on the synchronous path — between the second
      # label re-check and `gh pr merge --squash`, a few milliseconds of inter-command
      # latency. This is no worse than the prior `--auto` design's window between auto-
      # merge enable and the reactive `--disable-auto` revert. Closing it atomically
      # requires elevating the security-review policy to a required status check so the
      # ruleset itself refuses the merge — left as future work.
      - name: Wait for required checks, then squash-merge
        if: >-
          steps.effective.outputs.update-type != 'version-update:semver-major'
          && !contains(steps.metadata.outputs.dependency-names, 'openai/codex-action')
          && !contains(github.event.pull_request.labels.*.name, 'trust-boundary')
          && !contains(github.event.pull_request.labels.*.name, 'security-review-required')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          # Tri-state security-review label query. Returns "true" / "false" on a
          # successful gh response and "unknown" if the API call fails (rate limit,
          # network, 5xx). "true" means at least one of the two security-review labels
          # (`trust-boundary`, `security-review-required`) is present; either label
          # blocks auto-merge identically. Callers handle "unknown" by failing closed
          # — see the helper-level comments below for the policy reasoning. Stderr is
          # intentionally NOT redirected so the underlying gh failure (auth, rate limit,
          # transient 5xx) lands in the workflow log; the downstream `unknown` error
          # messages tell maintainers to investigate that output.
          security_review_state() {
            local result
            if ! result=$(gh pr view "$PR_URL" --json labels --jq 'any(.labels[]; .name == "trust-boundary" or .name == "security-review-required")'); then
              echo "unknown"
              return
            fi
            echo "$result"
          }

          # `gh pr merge --auto` is allowed to exit non-zero (already enabled, PR already
          # merged/closed, transient API error), but we then verify the desired state was
          # actually reached: PR is MERGED/CLOSED, or PR is OPEN with auto-merge enabled.
          # If neither holds, the call failed for a real reason (bot lacks merge permission,
          # repo `Allow auto-merge` disabled, GitHub outage) and the PR would be silently
          # stranded — surface the failure as a workflow error instead of pretending success.
          # Returns 0 on success, 1 on failure (with `::error::` annotations emitted).
          verify_auto_merge_or_terminal() {
            local state_json pr_state has_auto
            if ! state_json=$(gh pr view "$PR_URL" --json state,autoMergeRequest); then
              echo "::error::Failed to verify PR state after the gh pr merge --auto call. Cannot confirm whether auto-merge was enabled; manual intervention required."
              return 1
            fi
            pr_state=$(jq -r '.state' <<<"$state_json")
            has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state_json")
            case "$pr_state" in
              MERGED|CLOSED)
                echo "PR is $pr_state; nothing more to do."
                return 0 ;;
              OPEN)
                if [ "$has_auto" = "true" ]; then
                  return 0
                fi
                echo "::error::gh pr merge --auto exited but autoMergeRequest is still null on an OPEN PR. The auto-merge enable failed for a real reason — likely the github-actions bot lacks merge permission, the repository's Allow auto-merge setting is disabled, or a GitHub-side error. Investigate the gh pr merge output above and re-run after fixing."
                return 1 ;;
              *)
                echo "::error::Unexpected PR state '$pr_state' after auto-merge attempt; manual intervention required."
                return 1 ;;
            esac
          }

          # Enable GitHub auto-merge, verify the call took, and revert it if either
          # security-review label is now present (or its state has become unknown).
          # Returns 0 on full success, 1 on any verification or revert failure (with
          # appropriate `::error::` annotations). Disable-auto on a security-review PR
          # is a hard failure: silently logging it as a warning would let auto-merge
          # stay armed on a PR the policy says must remain manual, which is a worse
          # outcome than a noisy workflow failure. Same fail-closed treatment for the
          # `unknown` post-check: if we can't verify the label state after arming, we
          # defensively disable auto-merge and fail rather than risk a policy bypass.
          arm_auto_merge() {
            gh pr merge --auto --squash "$PR_URL" 2>&1 || true
            if ! verify_auto_merge_or_terminal; then
              return 1
            fi
            case "$(security_review_state)" in
              true)
                echo "security-review label (trust-boundary or security-review-required) is now present; reverting auto-merge."
                if ! gh pr merge --disable-auto "$PR_URL"; then
                  echo "::error::Failed to disable auto-merge on a security-review PR. The PR may still merge automatically when conditions are met, bypassing the policy that requires manual maintainer review. Investigate immediately."
                  return 1
                fi
                return 1 ;;
              unknown)
                echo "::error::Failed to verify security-review label state after arming auto-merge. Defensively disabling auto-merge to avoid a possible policy bypass — if a security-review label is actually present, we cannot rely on the reactive disable job to backstop us (it only fires on the labeled event, which may have already run before this point)."
                if ! gh pr merge --disable-auto "$PR_URL"; then
                  echo "::error::Failed to defensively disable auto-merge on a possibly security-review-required PR. Investigate immediately."
                fi
                return 1 ;;
            esac
            return 0
          }

          # Used by the unhappy paths (review not APPROVED, label state unknown). Enables
          # auto-merge as a graceful fallback so a later code-owner approval can finish the
          # merge; the reactive disable-auto-merge-on-security-review job below remains a
          # backstop for security-review label applications that land after this point.
          fall_back_to_auto_merge() {
            echo "::warning::$1; enabling GitHub auto-merge so a later code-owner approval (and/or the reactive disable-auto-merge job for security-review labels) can finish or halt the merge."
            if ! arm_auto_merge; then
              exit 1
            fi
            exit 0
          }

          # Pre-poll security-review check. `unknown` fails closed: if we can't see the
          # label state and a security-review label is actually present, the reactive
          # disable-auto-merge job may have already run on the labeled event before we
          # reach here — arming auto-merge with `fall_back_to_auto_merge` would leave it
          # active on a PR the policy says must be manual. A workflow failure is
          # recoverable via re-run; a silent policy bypass isn't.
          case "$(security_review_state)" in
            true)
              echo "security-review label (trust-boundary or security-review-required) is now present (applied after workflow start); skipping merge."
              exit 0
              ;;
            unknown)
              echo "::error::Failed to query security-review label state pre-poll. Refusing to arm auto-merge: if a security-review label is actually present, the reactive disable-auto-merge-on-security-review job may have already run before we'd arm auto-merge here, leaving an unrevoked merge on a PR the policy says must be manual. Investigate the gh pr view error above and re-run."
              exit 1
              ;;
          esac

          # `--required` filters to checks listed in the branch ruleset's required_status_checks.
          # `--watch` polls until each reaches a terminal conclusion. `--fail-fast` aborts on the
          # first required check that fails, surfacing the failure rather than waiting on the rest.
          #
          # If a required check fails (terminally or flakily) the watch exits non-zero. This
          # workflow's auto-merge job is skipped on `labeled` events and isn't triggered by
          # review events, so without a re-arm step a manual rerun-to-green of the failed
          # check has no path to finish the merge — the PR strands. Re-arm via auto-merge
          # (so the worker fires when the rerun lands), going through the same verified
          # `arm_auto_merge` helper as the fallback path so a real auto-merge enable failure
          # is surfaced as a second `::error::`. Exit 1 unconditionally so the check failure
          # stays visible as a workflow failure.
          if ! gh pr checks "$PR_URL" --required --watch --fail-fast; then
            echo "::warning::A required check failed during the wait; enabling GitHub auto-merge as a re-armed safety net so a later rerun-to-green of the failed check can fire the merge without a manual workflow re-trigger."
            arm_auto_merge || true
            exit 1
          fi

          # Post-poll security-review re-check. Same fail-closed treatment as the pre-poll
          # check — see the comment there for the policy-bypass reasoning.
          case "$(security_review_state)" in
            true)
              echo "security-review label (trust-boundary or security-review-required) was applied while waiting for checks; skipping merge."
              exit 0
              ;;
            unknown)
              echo "::error::Failed to query security-review label state post-poll. Refusing to arm auto-merge: see the pre-poll comment above for why a possibly-present security-review label cannot be safely backstopped from this point. Investigate the gh pr view error above and re-run."
              exit 1
              ;;
          esac

          # Verify the ruleset's review requirement is actually satisfied.  reviewDecision
          # is GitHub's authoritative answer — `APPROVED` only when every applicable rule
          # (incl. code-owner review) is met, regardless of whether `gh pr review --approve`
          # exited 0 above.
          if ! review_decision=$(gh pr view "$PR_URL" --json reviewDecision --jq .reviewDecision); then
            fall_back_to_auto_merge "Failed to query reviewDecision"
          fi
          if [ "$review_decision" != "APPROVED" ]; then
            fall_back_to_auto_merge "reviewDecision is '${review_decision:-<empty>}' (need APPROVED for synchronous merge)"
          fi

          # Mergeability isn't stable between the watch returning and this call: the base
          # branch can move (the ruleset has `strict_required_status_checks_policy: true`,
          # so BEHIND blocks the merge), GitHub can return a transient merge-state error,
          # or another rule can become pending. This workflow doesn't re-trigger on base-
          # branch updates, so a naked failure here would strand the PR. Fall back to
          # verified auto-merge — same `arm_auto_merge` helper used elsewhere — so a later
          # branch-update or transient-error recovery still completes the merge.
          if ! gh pr merge --squash "$PR_URL"; then
            fall_back_to_auto_merge "Synchronous squash merge failed (mergeability may have changed since the check wait completed — base branch advanced, transient API error, or branch is BEHIND)"
          fi

  # Reactive disable: if a maintainer applies either security-review label
  # (`trust-boundary` or `security-review-required`) after auto-merge has already been
  # enabled by the auto-merge job above, the label-guard `if:` on that step only prevents
  # re-enabling — it does not revoke a previously-enabled auto-merge. This job runs on
  # the `labeled` pull_request event and explicitly disables auto-merge so the PR stays
  # open for manual maintainer review and merging.
  #
  # A previously-posted auto-approval review (from the approve step above) is intentionally
  # left in place. Disabling auto-merge is sufficient to stop the automatic merge; the
  # ruleset's `dismiss_stale_reviews_on_push: true` will clear the bot review on the next push,
  # and the maintainer who applied the label can dismiss it manually if they want a clean
  # review state before re-evaluating.
  disable-auto-merge-on-security-review:
    if: >-
      github.event.action == 'labeled' &&
      (github.event.label.name == 'trust-boundary' || github.event.label.name == 'security-review-required') &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Pre-check whether auto-merge is currently enabled. Auto-merge may legitimately not be set
      # — e.g. semver-major bumps that the auto-merge job already excluded, or grouped bumps that
      # already contained `openai/codex-action` and hit the exclude-by-name guard at open time.
      # In those cases `gh pr merge --disable-auto` errors out and would fail this job for no
      # operational reason. Skip cleanly when there is nothing to disable.
      - name: Disable auto-merge if enabled
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
        # Bash strict mode so a transient `gh pr view` failure aborts the job rather than
        # silently leaving `auto_merge` empty and falling through to a misleading
        # `--disable-auto` error.
        run: |
          set -euo pipefail
          auto_merge=$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest')
          if [ "$auto_merge" = "null" ]; then
            echo "Auto-merge is not enabled on this PR; nothing to disable."
            exit 0
          fi
          gh pr merge --disable-auto "$PR_URL"
