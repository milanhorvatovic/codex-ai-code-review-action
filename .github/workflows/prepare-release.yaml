name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target version (e.g. 2.1.0 or 2.1.0-rc.1). Leave empty to compute from labels."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Run prepare-release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_APP_BOT_USER_ID: ${{ vars.RELEASE_APP_BOT_USER_ID }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION}" ]; then
            npm run prepare:release -- --version "${INPUT_VERSION}"
          else
            npm run prepare:release
          fi
