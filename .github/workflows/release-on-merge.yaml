name: Auto-tag release PR

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-tag
  cancel-in-progress: false

jobs:
  validate:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Derive version from head ref
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: echo "version=${HEAD_REF#release/v}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/verify-release
        with:
          version: ${{ steps.version.outputs.version }}

  tag:
    needs: validate
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Tag and push
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          BOT_USER_ID: ${{ vars.RELEASE_APP_BOT_USER_ID }}
        run: |
          set -euo pipefail
          VERSION="${HEAD_REF#release/v}"
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists at origin; nothing to do."
            exit 0
          fi
          if [ -z "${BOT_USER_ID}" ]; then
            echo "::error::vars.RELEASE_APP_BOT_USER_ID is empty; refusing to tag with a malformed bot email."
            exit 1
          fi
          BOT_LOGIN="oss-release-bot[bot]"
          git config user.name "${BOT_LOGIN}"
          git config user.email "${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          git tag "v${VERSION}" "${MERGE_SHA}"
          git push origin "v${VERSION}"
