name: Verify Dist

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-node-deps

      - uses: ./.github/actions/verify-dist
