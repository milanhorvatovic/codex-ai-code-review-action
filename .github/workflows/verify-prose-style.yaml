name: Verify Prose Style

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-prose-style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - name: Verify prose uses US English
        run: npm run verify:prose-style
