name: Verify Prose Style

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-prose-style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - name: Verify prose uses US English
        run: npm run verify:prose-style
