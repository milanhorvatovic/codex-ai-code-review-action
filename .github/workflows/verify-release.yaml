name: Verify release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Full SHA-1 commit ID to validate (40 lowercase hex chars). Refs like branch or tag names are rejected so that re-running the same `(sha, version)` pair always hits the same commit.
        required: true
        type: string
      version:
        description: Bare semver under test (e.g. 2.1.0 or 2.1.0-rc.1).
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Validate sha input
        env:
          SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          # actions/checkout would otherwise resolve branch/tag names here; the verifier exists to make (sha, version) pairs reproducible, so reject anything that isn't a full SHA-1 commit ID.
          if [[ ! "${SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Input 'sha' must be a full SHA-1 commit ID (40 lowercase hex chars). Refs like branch or tag names are rejected to keep verification reproducible. Got: ${SHA}"
            exit 1
          fi

      - name: Checkout verifier definition
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout release candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.sha }}
          path: candidate

      - uses: ./.github/actions/verify-release
        with:
          version: ${{ inputs.version }}
          working-directory: candidate
