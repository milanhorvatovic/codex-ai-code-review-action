name: Verify release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Full SHA-1 commit ID to validate (40 hex chars; case-insensitive, normalized to lowercase before checkout). Refs like branch or tag names are rejected so that re-running the same `(sha, version)` pair always hits the same commit.
        required: true
        type: string
      version:
        description: Bare semver under test (e.g. 2.1.0 or 2.1.0-rc.1).
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Validate sha input
        id: validate-sha
        env:
          SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          # Neutralize untrusted dispatch input before echoing into ::error:: workflow commands.
          # The same helper appears in .github/actions/verify-release/action.yaml and
          # .github/actions/verify-lockfile-version/action.yaml; keep the copies in sync.
          escape_workflow_command() {
            local value="$1"
            value="${value//%/%25}"
            value="${value//$'\r'/%0D}"
            value="${value//$'\n'/%0A}"
            printf '%s' "${value}"
          }
          # actions/checkout would otherwise resolve branch/tag names here; the verifier exists to make (sha, version) pairs reproducible, so reject anything that isn't a full SHA-1 commit ID. Hex is case-insensitive — accept upper/mixed and emit a lowercase canonical form below so downstream logs and cache keys reference one stable string regardless of input case.
          if [[ ! "${SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            escaped_sha="$(escape_workflow_command "${SHA}")"
            echo "::error::Input 'sha' must be a full SHA-1 commit ID (40 hex chars). Refs like branch or tag names are rejected to keep verification reproducible. Got: ${escaped_sha}"
            exit 1
          fi
          sha_lc="$(printf '%s' "${SHA}" | tr '[:upper:]' '[:lower:]')"
          echo "sha=${sha_lc}" >> "$GITHUB_OUTPUT"

      - name: Checkout verifier definition
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout release candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ steps.validate-sha.outputs.sha }}
          path: candidate

      - uses: ./.github/actions/verify-release
        with:
          version: ${{ inputs.version }}
          working-directory: candidate
