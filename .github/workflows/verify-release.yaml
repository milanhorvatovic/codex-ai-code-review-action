name: Verify release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to validate.
        required: true
        type: string
      version:
        description: Bare semver under test (e.g. 2.1.0 or 2.1.0-rc.1).
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.sha }}

      - uses: ./.github/actions/verify-release
        with:
          version: ${{ inputs.version }}
